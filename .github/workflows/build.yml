name: Build All Platforms

on:
  push:
    tags:
      - 'v*'          # 推送 v1.0.0 这类 tag 时自动构建 + 发布
  workflow_dispatch:    # 也可以在 GitHub 网页上手动触发

jobs:
  # ─── Windows ──────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Package (zip)
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath one-click-ai-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: one-click-ai-windows-x64.zip

  # ─── macOS ────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get

      # Disable sandbox for installer tool (needs to run shell commands)
      - run: flutter build macos --release

      - name: Package (dmg)
        run: |
          # Create a proper app bundle structure
          APP="build/macos/Build/Products/Release/one_click_ai.app"
          # Zip the .app for distribution
          cd build/macos/Build/Products/Release
          zip -r ../../../../../one-click-ai-macos.zip one_click_ai.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: one-click-ai-macos.zip

  # ─── Linux ────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake clang ninja-build pkg-config \
            libgtk-3-dev liblzma-dev

      - run: flutter pub get

      - run: flutter build linux --release

      - name: Package (tar.gz)
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../one-click-ai-linux-x64.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: one-click-ai-linux-x64.tar.gz

  # ─── Create Release ──────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-build
      - uses: actions/download-artifact@v4
        with:
          name: macos-build
      - uses: actions/download-artifact@v4
        with:
          name: linux-build

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            one-click-ai-windows-x64.zip
            one-click-ai-macos.zip
            one-click-ai-linux-x64.tar.gz
          generate_release_notes: true
